<style>
  :root{
    --paper:#F4F1E8; --paper2:#FBFAF4; --card:#FCFBF6;
    --ink:#1B2620; --ink-soft:#6A756D; --ink-faint:#9AA39B;
    --line:#DCD5C4; --line-strong:#C9C0AB;
    --accent:#1E5C4F; --accent-soft:#E4ECE7;
    --ok:#2F7A5B; --warn:#C9912E; --over:#B5462C;
    --r:14px;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans','IBM Plex Sans JP',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:480px;margin:0 auto;min-height:100vh;
    background:
      radial-gradient(circle at 18% 12%, rgba(30,92,79,.04), transparent 40%),
      var(--paper);
    display:flex;flex-direction:column;
    box-shadow:0 0 60px rgba(27,38,32,.06);
  }
  header{
    padding:18px 20px 12px;position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--paper) 78%, transparent);
    backdrop-filter:saturate(1.1);
  }
  .brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-.01em;display:flex;align-items:center;gap:9px}
  .brand h1 .dot{width:9px;height:9px;border-radius:2px;background:var(--accent);display:inline-block;transform:rotate(45deg)}
  .lang{font-family:var(--mono);font-size:11px;border:1px solid var(--line-strong);
    background:var(--paper2);border-radius:20px;overflow:hidden;display:flex}
  .lang button{border:0;background:transparent;font-family:var(--mono);font-size:11px;
    padding:5px 9px;color:var(--ink-soft);cursor:pointer}
  .lang button.on{background:var(--ink);color:var(--paper)}
  main{flex:1;padding:4px 16px 96px;overflow-y:auto}
  /* ---- cards ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:16px;margin:12px 0}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.08em;
    text-transform:uppercase;color:var(--ink-faint)}
  /* ---- budget gauge ---- */
  .gauge .top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
  .gauge .spent{font-family:var(--mono);font-size:30px;font-weight:600;letter-spacing:-.02em}
  .gauge .of{font-family:var(--mono);font-size:13px;color:var(--ink-soft)}
  .bar{height:12px;border-radius:7px;background:var(--accent-soft);
    overflow:hidden;border:1px solid var(--line);margin:10px 0 8px}
  .bar > i{display:block;height:100%;border-radius:7px 0 0 7px;transition:width .5s cubic-bezier(.2,.8,.2,1)}
  .gauge .legend{display:flex;justify-content:space-between;font-size:12.5px;color:var(--ink-soft)}
  .gauge .legend b{font-family:var(--mono);color:var(--ink);font-weight:600}
  .month-pick{display:flex;align-items:center;gap:8px;margin:2px 0 0}
  .month-pick button{border:1px solid var(--line-strong);background:var(--paper2);
    width:30px;height:30px;border-radius:9px;cursor:pointer;color:var(--ink);font-size:15px;line-height:1}
  .month-pick .m{font-family:var(--mono);font-size:13px;flex:1;text-align:center;color:var(--ink-soft)}
  /* ---- category breakdown ---- */
  .cat-row{display:flex;align-items:center;gap:10px;margin:11px 0}
  .cat-row .sw{width:11px;height:11px;border-radius:3px;flex:none}
  .cat-row .nm{flex:none;width:84px;font-size:13.5px}
  .cat-row .track{flex:1;height:8px;background:var(--accent-soft);border-radius:5px;overflow:hidden}
  .cat-row .track > i{display:block;height:100%;border-radius:5px}
  .cat-row .amt{font-family:var(--mono);font-size:12.5px;color:var(--ink-soft);width:64px;text-align:right}

  .tape{position:relative;background:var(--paper2);border:1px dashed var(--line-strong);
    border-radius:8px;padding:12px 13px;margin:9px 0}
  .tape .rh{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .tape .rh .mch{font-weight:600;font-size:14px}
  .tape .rh .dt{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
  .leader{display:flex;align-items:baseline;gap:6px;font-size:13px;margin:5px 0}
  .leader .l{flex:1;border-bottom:1px dotted var(--line-strong);transform:translateY(-3px)}
  .leader .p{font-family:var(--mono);font-size:12.5px}
  .leader .nm{max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tape .tot{display:flex;justify-content:space-between;border-top:1px solid var(--line-strong);
    margin-top:8px;padding-top:7px;font-weight:600}
  .tape .tot .p{font-family:var(--mono)}
  .pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:1px 7px;border-radius:10px;
    background:var(--accent-soft);color:var(--accent);margin-left:6px;vertical-align:middle}
  /* ---- buttons ---- */
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;
    border:0;border-radius:12px;padding:15px;font-family:var(--sans);font-size:15.5px;
    font-weight:600;cursor:pointer;color:#fff;background:var(--accent)}
  .btn.alt{background:var(--paper2);color:var(--ink);border:1px solid var(--line-strong)}
  .btn.sm{padding:11px;font-size:14px}
  .btn:active{transform:translateY(1px)}
  .btn:disabled{opacity:.55}
  .btnrow{display:flex;gap:10px}
  .btnrow > *{flex:1}
  /* ---- inputs ---- */
  label.fld{display:block;margin:13px 0 0}
  label.fld .lab{font-size:12.5px;color:var(--ink-soft);margin-bottom:5px;display:block}
  input,select{width:100%;font-family:var(--sans);font-size:15px;color:var(--ink);
    background:var(--paper2);border:1px solid var(--line-strong);border-radius:10px;padding:11px 12px}
  input.num{font-family:var(--mono);text-align:right}
  /* ---- review table ---- */
  .rrow{display:flex;gap:8px;align-items:center;margin:8px 0}
  .rrow input.rn{flex:1;padding:9px 10px;font-size:13.5px}
  .rrow input.rp{width:80px;padding:9px 10px;font-size:13px}
  .rrow select.rc{width:108px;padding:9px 8px;font-size:12.5px}
  .rrow .del{flex:none;width:30px;height:38px;border:1px solid var(--line-strong);background:var(--paper2);

  /* ---- nav ---- */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;

  .note{font-size:12px;color:var(--ink-faint);margin-top:8px;line-height:1.45}
  .err{background:#fbeae6;border:1px solid #e7c4ba;color:var(--over);border-radius:10px;

  .sectit{font-size:13px;font-weight:600;color:var(--ink-soft);margin:18px 4px 2px;
    display:flex;align-items:center;gap:7px}
  .preview{width:100%;border-radius:10px;border:1px solid var(--line);margin:10px 0;max-height:230px;object-fit:cover}
  .cfgcat{display:flex;align-items:center;gap:9px;margin:7px 0}
  .cfgcat .sw{width:13px;height:13px;border-radius:3px;flex:none}
  .cfgcat input{flex:1}
  .cfgcat .del{flex:none;width:34px;height:38px;border:1px solid var(--line-strong);background:var(--paper2);
    border-radius:9px;color:var(--over);cursor:pointer}
  .trio{display:flex;gap:8px;margin-top:14px}
  .trio>div{flex:1;text-align:center;background:var(--paper2);border:1px solid var(--line);border-radius:11px;padding:10px 4px}
  .trio .big{font-family:var(--mono);font-size:16px;font-weight:600;margin-top:4px;letter-spacing:-.01em}
  .hero{font-family:var(--mono);font-size:34px;font-weight:600;letter-spacing:-.02em;margin-top:4px}
  .modal-bg{position:fixed;inset:0;background:rgba(20,28,23,.46);z-index:50;display:flex;
    align-items:flex-end;justify-content:center;animation:fade .18s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:var(--card);width:100%;max-width:480px;border-radius:20px 20px 0 0;
    padding:20px 18px calc(26px + env(safe-area-inset-bottom));border:1px solid var(--line);
    box-shadow:0 -10px 40px rgba(20,28,23,.2);animation:rise .22s cubic-bezier(.2,.8,.2,1)}
  @keyframes rise{from{transform:translateY(40px)}to{transform:translateY(0)}}
  .tape.cashin{border-style:solid;border-color:var(--line-strong);background:#F1F5EF}
  .ta{width:100%;height:170px;font-family:var(--mono);font-size:11.5px;line-height:1.45;
    border:1px solid var(--line-strong);border-radius:10px;padding:10px;background:var(--paper2);
    resize:vertical;white-space:pre;overflow:auto;color:var(--ink)}
  .datacard .btnrow{margin-top:10px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>

<script>
/* ============ storage layer (localStorage with in-memory fallback) ============ */
const LS = (()=>{ try{ const k='__lstest'; localStorage.setItem(k,'1'); localStorage.removeItem(k); return true; }catch(e){ return false; } })();
const hasStore = LS;
const mem = {};
async function sGet(k){
  if(LS){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  return (k in mem)? mem[k] : null;
}
async function sSet(k,v){
  if(LS){ try{ localStorage.setItem(k,v); }catch(e){ console.error('store',e); } }
  else { mem[k]=v; }
}

/* ============ state ============ */
let cfg = null;       // {lang,currency,monthlyBudget,categories,caps}
let receipts = [];    // [{id,date,merchant,total,items:[{name,price,cat}]}]
let cash = [];        // [{id,date,amount,note}]  money handed to the helper
let tab = 'home';
let selMonth = ym(new Date());
let draft = null;     // receipt being reviewed
let busy = false, errMsg = '';
let queue=[], queueTotal=0, queueIdx=0;   // batch processing of multiple images
let showCash=false, cashDraft=null;       // give-cash modal
let showData=false, dataView=null;        // export/backup modal
let showImport=false;                      // paste-to-merge modal

function t(k){ return (I18N[cfg?cfg.lang:'en'][k]) || k; }
function ym(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function todayISO(){ const d=new Date(); return d.toISOString().slice(0,10); }
function sym(){ return CURRENCIES[cfg.currency]||cfg.currency+' '; }
function fmt(n){
  n = Number(n)||0;
  const dec = cfg.currency==='JPY' ? 0 : 2;
  return sym()+n.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function catById(id){ return (cfg.categories.find(c=>c.id===id)) || {id:'other',en:'Other',ja:'その他',color:'#8A938B'}; }
function catName(c){ return cfg.lang==='ja' ? (c.ja||c.en) : c.en; }

/* ============ persistence ============ */
async function boot(){
  const c = await sGet('cfg:v2');
  if(c){ cfg = JSON.parse(c); }
  else { cfg = {lang:'ja', currency:'SGD', monthlyBudget:1500, categories:DEFAULT_CATS.slice(), caps:{}, ocr:{mode:'tesseract',key:''}}; await persistCfg(); }
  if(!cfg.caps) cfg.caps={};
  if(!cfg.ocr) cfg.ocr={mode:'tesseract',key:''};
  const r = await sGet('rcpt:v2');
  receipts = r ? JSON.parse(r) : [];
  const ca = await sGet('cash:v2');
  cash = ca ? JSON.parse(ca) : [];
  render();
}
async function persistCfg(){ await sSet('cfg:v2', JSON.stringify(cfg)); }
async function persistReceipts(){ await sSet('rcpt:v2', JSON.stringify(receipts)); }
async function persistCash(){ await sSet('cash:v2', JSON.stringify(cash)); }

/* ============ vision extraction via Claude ============ */
async function readFile(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('read'));
    r.readAsDataURL(file);
  });
}
// Re-draw via canvas: applies EXIF orientation (fixes upside-down/rotated phone photos)
// and shrinks to a sensible size for faster, cheaper, more reliable reading.
function downscaleImage(dataUrl, maxEdge){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      try{
        const scale=Math.min(1, maxEdge/Math.max(img.width,img.height));
        const cw=Math.max(1,Math.round(img.width*scale)), ch=Math.max(1,Math.round(img.height*scale));
        const canvas=document.createElement('canvas');
        canvas.width=cw; canvas.height=ch;
        const ctx=canvas.getContext('2d');
        ctx.fillStyle='#fff'; ctx.fillRect(0,0,cw,ch);
        ctx.drawImage(img,0,0,cw,ch);
        resolve(canvas.toDataURL('image/jpeg',0.85));
      }catch(e){ resolve(dataUrl); }
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}
async function extractReceipt(dataUrl){
  const mode = (cfg.ocr && cfg.ocr.mode) || 'tesseract';
  if(mode==='claude' && cfg.ocr && cfg.ocr.key){
    return await extractWithClaude(dataUrl, cfg.ocr.key.trim());
  }
  return await extractWithTesseract(dataUrl);
}

/* --- high accuracy: user's own Claude API key (key stored only on this device) --- */
async function extractWithClaude(dataUrl, key){
  const m = dataUrl.match(/^data:(.+?);base64,(.*)$/);
  if(!m) throw new Error('bad image');
  const mediaType = m[1], b64 = m[2];
  const catList = cfg.categories.map(c=>c.id).join(', ');
  const instruction =
    'You read a photo of a shopping receipt and return structured data. '+
    'Return ONLY a single JSON object, no markdown fences, no commentary. '+
    'Schema: {"merchant":string,"date":"YYYY-MM-DD","items":[{"name":string,"price":number,"cat":string}],"total":number}. '+
    'Keep item names short. Use the printed prices as numbers (no currency symbol). '+
    '"cat" must be exactly one of these ids: '+catList+'. Pick the best fit per item. '+
    'If the date is unreadable use today. If you cannot read a value, give your best estimate.';
  const body = {
    model:'claude-sonnet-4-6', max_tokens:1024,
    messages:[{role:'user',content:[
      {type:'text',text:instruction},
      {type:'image',source:{type:'base64',media_type:mediaType,data:b64}}
    ]}]
  };
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify(body)
  });
  if(!resp.ok){
    let detail=''; try{ const ej=await resp.json(); detail=(ej && ej.error && ej.error.message)? ej.error.message : ''; }catch(_){}
    throw new Error('API '+resp.status+(detail? (': '+detail):''));
  }
  const data = await resp.json();
  const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('').trim();
  let clean = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  const s=clean.indexOf('{'), e=clean.lastIndexOf('}');
  if(s>=0&&e>=0) clean=clean.slice(s,e+1);
  const parsed = JSON.parse(clean);
  const valid = new Set(cfg.categories.map(c=>c.id));
  return {
    merchant: parsed.merchant || '',
    date: /^\d{4}-\d{2}-\d{2}$/.test(parsed.date||'') ? parsed.date : todayISO(),
    items: (parsed.items||[]).map(it=>({
      name:String(it.name||'').slice(0,60), price:Number(it.price)||0,
      cat: valid.has(it.cat)? it.cat : 'other'
    })),
    total: Number(parsed.total)||0
  };
}

/* --- free / offline: on-device OCR via Tesseract.js + heuristic parse --- */
async function extractWithTesseract(dataUrl){
  if(typeof Tesseract === 'undefined') throw new Error('ocr-not-loaded');
  const { data } = await Tesseract.recognize(dataUrl, 'eng');
  return parseReceiptText(data.text || '');
}
function lastNumber(line){
  const m = line.match(/(\d{1,4}[.,]\d{2})(?!.*\d)/);
  if(!m) return null;
  const v = parseFloat(m[1].replace(',', '.'));
  return isNaN(v)? null : v;
}
function clampDate(y,mo,d){
  y=+y; mo=Math.min(12,Math.max(1,+mo)); d=Math.min(31,Math.max(1,+d));
  return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
}
function detectDate(text){
  let m;
  if((m=text.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/))) return clampDate(m[1],m[2],m[3]);
  if((m=text.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{4})/))) return clampDate(m[3],m[2],m[1]); // dd/mm/yyyy
  if((m=text.match(/(\d{1,2})[-\/.](\d{1,2})[-\/.](\d{2})\b/))) return clampDate('20'+m[3],m[2],m[1]);
  return todayISO();
}
function parseReceiptText(text){
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const date = detectDate(text);
  let merchant='';
  for(const l of lines){ if(/[A-Za-z]{3,}/.test(l)){ merchant=l.slice(0,40); break; } }
  let total=0;
  for(const l of lines){
    if(/\b(total|amount due|grand total|balance due)\b/i.test(l) && !/sub.?total/i.test(l)){
      const n=lastNumber(l); if(n!=null) total=n;
    }
  }
  const skip=/\b(sub.?total|total|cash|change|gst|tax|svc|service|rounding|balance|amount|tel|phone|receipt|invoice|date|time|qty|visa|master|card|approved|thank)\b/i;
  const items=[];
  for(const l of lines){
    if(skip.test(l)) continue;
    const n=lastNumber(l);
    if(n!=null && n>0){
      const name=l.replace(/[\$Ss]?\s*\d{1,4}[.,]\d{2}\s*$/,'').replace(/\s{2,}/g,' ').trim();
      if(name.replace(/[^A-Za-z0-9]/g,'').length>=2) items.push({name:name.slice(0,40), price:n, cat:'other'});
    }
  }
  if(!total) total=items.reduce((s,i)=>s+i.price,0);
  return { merchant, date, items: items.length? items : [{name:'',price:0,cat:'groceries'}], total };
}

function monthReceipts(m){ return receipts.filter(r=> (r.date||'').slice(0,7)===m ); }
function monthSpent(m){ return monthReceipts(m).reduce((s,r)=>s+(Number(r.total)||0),0); }
function monthByCat(m){
  const map={};
  monthReceipts(m).forEach(r=> r.items.forEach(it=>{ map[it.cat]=(map[it.cat]||0)+(Number(it.price)||0); }));
  return map;
}
function shiftMonth(delta){
  const [y,mo]=selMonth.split('-').map(Number);
  const d=new Date(y,mo-1+delta,1); selMonth=ym(d); render();
}
function monthLabel(m){
  const [y,mo]=m.split('-').map(Number);
  const d=new Date(y,mo-1,1);
  return cfg.lang==='ja'? `${y}年${mo}月` : d.toLocaleDateString('en',{month:'long',year:'numeric'});
}
function monthCash(m){ return cash.filter(c=> (c.date||'').slice(0,7)===m ); }
function monthGiven(m){ return monthCash(m).reduce((s,c)=>s+(Number(c.amount)||0),0); }
function totalGiven(){ return cash.reduce((s,c)=>s+(Number(c.amount)||0),0); }
function totalSpent(){ return receipts.reduce((s,r)=>s+(Number(r.total)||0),0); }
function balance(){ return totalGiven()-totalSpent(); }
function fmtSigned(n){ return (n<0?'−':n>0?'+':'')+fmt(Math.abs(n)); }
// combined ledger entries (money in = handout, money out = receipt)
function allEntries(){
  const a=[];
  cash.forEach(c=>a.push({type:'in',date:c.date||'',key:(c.date||'')+c.id,obj:c}));
  receipts.forEach(r=>a.push({type:'out',date:r.date||'',key:(r.date||'')+r.id,obj:r}));

}

      <textarea id="dataText" class="ta" readonly>${esc(dataView.text)}</textarea>
      <div class="btnrow">
        <button class="btn alt" data-action="copyData">${t('copy')}</button>
        <button class="btn alt" data-action="downloadData">${t('download')}</button>
      </div>
      <button class="btn" data-action="closeData" style="margin-top:10px">${t('close')}</button>
    </div>

}

function importModalHTML(){
  if(!showImport) return '';
  return `<div class="modal-bg" data-action="importbg">
    <div class="modal datacard" data-action="noop">
      <div class="eyebrow">${t('importMerge')}</div>
      <p class="note" style="margin:6px 0 8px">${t('importNote')}</p>
      <textarea id="importText" class="ta" placeholder="${t('importPaste')}"></textarea>
      <div class="btnrow" style="margin-top:12px">
        <button class="btn alt" data-action="closeImport">${t('cancel')}</button>
        <button class="btn" data-action="doImport">${t('importDo')}</button>
      </div>
    </div>
  </div>`;
}
// merge pasted JSON into existing data (adds, never overwrites)
function mergeImport(text){
  const data = JSON.parse(text);
  let recs=[], cashArr=[];
  if(Array.isArray(data)) recs=data;
  else if(data && (data.receipts || data.cash)){ recs=data.receipts||[]; cashArr=data.cash||[]; }
  else if(data && data.items) recs=[data];
  else throw new Error('shape');
  const valid=new Set(cfg.categories.map(c=>c.id));
  const stamp=Date.now();
  recs.forEach((r,idx)=>{
    const items=(r.items||[]).map(it=>({name:String(it.name||'').slice(0,60), price:Number(it.price)||0, cat: valid.has(it.cat)? it.cat : 'other'}));
    receipts.push({
      id:'r'+stamp+'_'+idx,
      date: /^\d{4}-\d{2}-\d{2}$/.test(r.date||'')? r.date : todayISO(),
      merchant:String(r.merchant||''),
      items: items.length? items : [{name:'',price:0,cat:'other'}],
      total: Number(r.total)|| items.reduce((s,it)=>s+it.price,0)
    });
  });
  cashArr.forEach((c,idx)=>{
    cash.push({
      id:'c'+stamp+'_'+idx,
      date: /^\d{4}-\d{2}-\d{2}$/.test(c.date||'')? c.date : todayISO(),
      amount:Number(c.amount)||0, note:String(c.note||'').slice(0,60)
    });
  });
  return recs.length + cashArr.length;
}

    cats+=`<div class="cfgcat">
      <span class="sw" style="background:${c.color}"></span>
      <input data-cfgcat="${i}" value="${esc(cfg.lang==='ja'?(c.ja||c.en):c.en)}">
      <input class="num" style="width:78px" data-cap="${c.id}" value="${cfg.caps[c.id]||''}" placeholder="${t('cap')}" inputmode="decimal">
      ${c.id!=='other'?`<button class="del" data-action="delCat" data-i="${i}">×</button>`:''}

  const isClaude = cfg.ocr && cfg.ocr.mode==='claude';

    <label class="fld"><span class="lab">${t('currency')}</span>
      <select data-cfg="currency">${curOpts.replace(`value="${cfg.currency}"`,`value="${cfg.currency}" selected`)}</select></label>
    <div class="sectit" style="margin:18px 4px 2px">${t('categories')}</div>
    <p class="note" style="margin-top:0">${t('perCat')}</p>
    ${cats}
    <button class="btn alt sm" data-action="addCat" style="margin-top:8px">＋ ${t('addCat')}</button>
    <button class="btn" data-action="saveCfg" style="margin-top:16px">${t('saveSettings')}</button>
    <p class="note">${hasStore?'':'⚠ '+t('noKey')}</p>
  </div>
  <div class="card">
    <div class="eyebrow">${t('ocrSection')}</div>
    <label class="fld"><span class="lab">${t('ocrMode')}</span>
      <select data-ocr="mode">
        <option value="tesseract"${isClaude?'':' selected'}>${t('ocrFree')}</option>
        <option value="claude"${isClaude?' selected':''}>${t('ocrClaude')}</option>
      </select></label>
    ${isClaude
      ? `<label class="fld"><span class="lab">${t('apiKey')}</span>
          <input type="password" data-ocr="key" value="${esc(cfg.ocr.key||'')}" placeholder="sk-ant-..." autocomplete="off"></label>
         <p class="note">${t('apiKeyNote')}</p>`
      : `<p class="note">${t('ocrFreeNote')}</p>`}
    <button class="btn" data-action="saveOcr" style="margin-top:14px">${t('saveSettings')}</button>

  <div class="card">
    <div class="eyebrow">${t('dataSection')}</div>
    <div class="btnrow" style="margin-top:12px">

    <button class="btn alt sm" data-action="exportJson" style="margin-top:10px">${t('backupJson')}</button>
    <button class="btn alt sm" data-action="importJson" style="margin-top:10px">${t('restore')}</button>

}

function navHTML(){
  const items=[['home','◇'],['history','≣'],['scan','＋'],['settings','⚙']];
  // order: home, history, scan(center), settings
  const order=[['home','◇'],['history','≣'],['scan',''],['settings','⚙']];
  return order.map(([k])=>{
    if(k==='scan'){
      return `<button class="scan ${tab==='scan'?'on':''}" data-action="tab" data-t="scan">
        <span class="ic">＋</span><span style="margin-top:2px">${t('scan')}</span></button>`;
    }
    const ic={home:'◇',history:'≣',settings:'⚙'}[k];
    return `<button class="${tab===k?'on':''}" data-action="tab" data-t="${k}">
      <span class="ic" style="font-size:21px;line-height:23px">${ic}</span><span>${t(k)}</span></button>`;
  }).join('');
}

/* ============ render ============ */
function render(){
  if(!cfg) return;
  document.getElementById('brandName').textContent=t('brand');
  document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.v===cfg.lang));
  const v=document.getElementById('view');
  v.innerHTML = tab==='home'?vHome(): tab==='scan'?vScan(): tab==='history'?vHistory(): vSettings();
  document.getElementById('nav').innerHTML=navHTML();
  document.getElementById('modalRoot').innerHTML=cashModalHTML()+dataModalHTML()+importModalHTML();
  if(showData){ const ta=document.getElementById('dataText'); if(ta){ ta.focus(); ta.select(); } }
}

/* ============ events ============ */
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

document.addEventListener('click', async (e)=>{
  const el=e.target.closest('[data-action]'); if(!el) return;
  const a=el.dataset.action;
  if(a==='lang'){ cfg.lang=el.dataset.v; await persistCfg(); render(); return; }
  if(a==='tab'){ const tt=el.dataset.t; if(tt!=='scan'){ draft=null; errMsg=''; queue=[]; queueTotal=0; busy=false; } else if(tab!=='scan'){ draft=null; errMsg=''; } tab=tt; render(); return; }
  if(a==='month'){ shiftMonth(Number(el.dataset.d)); return; }
  if(a==='pick'){ document.getElementById('fileIn').click(); return; }
  if(a==='manual'){ draft=blankDraft(); errMsg=''; pendingPreview=''; render(); return; }
  if(a==='addItem'){ draft.items.push({name:'',price:0,cat:cfg.categories[0].id}); render(); return; }
  if(a==='delItem'){ draft.items.splice(Number(el.dataset.i),1); if(!draft.items.length) draft.items.push({name:'',price:0,cat:cfg.categories[0].id}); render(); return; }
  if(a==='cancelDraft'){ draft=null; pendingPreview=''; errMsg=''; if(queue.length){ processNext(); } else { queueTotal=0; tab='home'; render(); } return; }
  if(a==='saveDraft'){
    draft.total=draftTotal();
    draft.items=draft.items.filter(i=>i.name||i.price);
    if(!draft.items.length){ return; }
    receipts.push({id:draft.id,merchant:draft.merchant,date:draft.date,items:draft.items,total:draft.total});
    await persistReceipts();
    draft=null; pendingPreview=''; selMonth=(receipts[receipts.length-1].date||todayISO()).slice(0,7);
    if(queue.length){ processNext(); } else { queueTotal=0; tab='home'; render(); }
    return;
  }
  if(a==='delRcpt'){
    if(confirm(t('confirmDel'))){ receipts=receipts.filter(r=>r.id!==el.dataset.id); await persistReceipts(); render(); }
    return;
  }
  if(a==='giveMoney'){ cashDraft={date:todayISO(),amount:'',note:''}; showCash=true; render(); return; }
  if(a==='noop'){ return; }
  if(a==='cashbg'||a==='cancelCash'){ showCash=false; cashDraft=null; render(); return; }
  if(a==='saveCash'){
    const amt=Number(cashDraft.amount);
    if(!amt||amt<=0){ alert(t('needAmount')); return; }
    cash.push({id:'c'+Date.now(),date:cashDraft.date||todayISO(),amount:amt,note:(cashDraft.note||'').slice(0,60)});
    await persistCash();
    selMonth=(cash[cash.length-1].date||todayISO()).slice(0,7);
    showCash=false; cashDraft=null; render(); return;
  }
  if(a==='delCash'){
    if(confirm(t('confirmDel'))){ cash=cash.filter(c=>c.id!==el.dataset.id); await persistCash(); render(); }
    return;
  }
  if(a==='exportLedgerCsv'){
    if(!cash.length && !receipts.length){ alert(t('nothingExport')); return; }
    dataView={title:t('exportLedger'),text:buildLedgerCsv(),filename:'ledger_'+todayISO()+'.csv',mime:'text/csv;charset=utf-8',bom:true};
    showData=true; render(); return;
  }
  if(a==='exportItemsCsv'){
    if(!receipts.length){ alert(t('nothingExport')); return; }
    dataView={title:t('exportItems'),text:buildItemsCsv(),filename:'items_'+todayISO()+'.csv',mime:'text/csv;charset=utf-8',bom:true};
    showData=true; render(); return;
  }
  if(a==='exportJson'){
    dataView={title:t('backupJson'),text:buildJson(),filename:'household_ledger_backup_'+todayISO()+'.json',mime:'application/json',bom:false};
    showData=true; render(); return;
  }
  if(a==='importJson'){ document.getElementById('restoreIn').click(); return; }
  if(a==='openImport'){ showImport=true; render(); return; }
  if(a==='importbg'||a==='closeImport'){ showImport=false; render(); return; }
  if(a==='doImport'){
    const ta=document.getElementById('importText');
    const txt=ta? ta.value.trim():'';
    if(!txt){ showImport=false; render(); return; }
    try{
      const n=mergeImport(txt);
      await persistReceipts(); await persistCash();
      if(receipts.length) selMonth=(receipts[receipts.length-1].date||todayISO()).slice(0,7);
      showImport=false; tab='home'; render();
      setTimeout(()=>alert(t('imported')+(n?(' ('+n+')'):'')),50);
    }catch(e){ alert(t('importFail')); }
    return;
  }
  if(a==='databg'||a==='closeData'){ showData=false; dataView=null; render(); return; }
  if(a==='copyData'){
    const txt=dataView?dataView.text:'';
    try{ await navigator.clipboard.writeText(txt); el.textContent=t('copied'); setTimeout(()=>render(),900); }
    catch(e){
      const ta=document.getElementById('dataText');
      if(ta){ ta.focus(); ta.select(); try{ document.execCommand('copy'); el.textContent=t('copied'); setTimeout(()=>render(),900); }catch(_){} }
    }
    return;
  }
  if(a==='downloadData'){
    try{
      const content=(dataView.bom?'\uFEFF':'')+dataView.text;
      const blob=new Blob([content],{type:dataView.mime});
      const url=URL.createObjectURL(blob);
      const link=document.createElement('a'); link.href=url; link.download=dataView.filename;
      document.body.appendChild(link); link.click(); document.body.removeChild(link);
      setTimeout(()=>URL.revokeObjectURL(url),2000);
    }catch(e){ alert('Download was blocked here. Please use Copy instead.'); }
    return;
  }
  if(a==='addCat'){
    const id='c'+Date.now();
    const palette=['#2F7A5B','#C9912E','#B5462C','#3E6E8E','#8A5BA6','#C76A8E','#5BA68A','#A6885B'];
    cfg.categories.splice(cfg.categories.length-1,0,{id,en:'New',ja:'新規',color:palette[cfg.categories.length%palette.length]});
    render(); return;
  }
  if(a==='delCat'){
    const i=Number(el.dataset.i); cfg.categories.splice(i,1); render(); return;
  }
  if(a==='saveCfg'){
    // pull live inputs
    document.querySelectorAll('[data-cfg]').forEach(inp=>{
      const k=inp.dataset.cfg; cfg[k]= k==='monthlyBudget'? (Number(inp.value)||0) : inp.value;
    });
    document.querySelectorAll('[data-cfgcat]').forEach(inp=>{
      const i=Number(inp.dataset.cfgcat); if(cfg.categories[i]){ if(cfg.lang==='ja') cfg.categories[i].ja=inp.value; else cfg.categories[i].en=inp.value; }
    });
    cfg.caps={};
    document.querySelectorAll('[data-cap]').forEach(inp=>{ if(inp.value) cfg.caps[inp.dataset.cap]=Number(inp.value)||0; });
    await persistCfg();
    el.textContent=t('saved'); setTimeout(()=>render(),700); return;
  }
  if(a==='saveOcr'){
    const keyInp=document.querySelector('[data-ocr="key"]');
    if(keyInp) cfg.ocr.key=keyInp.value.trim();
    await persistCfg();
    el.textContent=t('saved'); setTimeout(()=>render(),700); return;
  }
});

document.addEventListener('input', (e)=>{
  const el=e.target;
  if(el.dataset.ocr){
    if(el.dataset.ocr==='mode'){ cfg.ocr.mode=el.value; render(); }
    else if(el.dataset.ocr==='key'){ cfg.ocr.key=el.value; }
    return;
  }
  if(el.dataset.cashfield && cashDraft){ cashDraft[el.dataset.cashfield]=el.value; return; }
  if(el.dataset.field && draft!=null){
    const f=el.dataset.field;
    if(f==='merchant'){ draft.merchant=el.value; return; }
    if(f==='date'){ draft.date=el.value; return; }
    const i=Number(el.dataset.i);
    if(f==='name') draft.items[i].name=el.value;
    else if(f==='price'){ draft.items[i].price=el.value; updateDraftTotal(); }
    else if(f==='cat') draft.items[i].cat=el.value;
  }
});
function updateDraftTotal(){
  const tot=document.querySelector('#view .tape .tot .p');
  if(tot) tot.textContent=fmt(draftTotal());
}

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('service-worker.js').catch(()=>{}); });
}
boot();
</script>
